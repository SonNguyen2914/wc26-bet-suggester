# Alembic config for the LIVE data plane only (the WC26 archive database
# keeps its tiny forward-only migration in src/db.py and is NOT managed
# here). URL comes from LIVE_DATABASE_URL via live_migrations/env.py.
[alembic]
script_location = live_migrations

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
